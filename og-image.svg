<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0f0c29"/>
      <stop offset="50%"  stop-color="#1a1040"/>
      <stop offset="100%" stop-color="#0d1b2a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#6c63ff"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#6c63ff"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Glow blobs -->
  <circle cx="200"  cy="150" r="250" fill="#6c63ff" opacity="0.12" filter="url(#blur)"/>
  <circle cx="1050" cy="480" r="280" fill="#a855f7" opacity="0.10" filter="url(#blur)"/>
  <circle cx="600"  cy="630" r="200" fill="#3b82f6" opacity="0.08" filter="url(#blur)"/>

  <!-- Grid lines (subtle) -->
  <g stroke="#ffffff" stroke-width="0.5" opacity="0.04">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="150" y1="0" x2="150" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="450" y1="0" x2="450" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="750" y1="0" x2="750" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1050" y1="0" x2="1050" y2="630"/>
  </g>

  <!-- Logo badge -->
  <rect x="80" y="68" width="68" height="68" rx="18" fill="url(#glow)"/>
  <text x="114" y="116" font-family="Arial, sans-serif" font-size="38" font-weight="900" fill="white" text-anchor="middle">W</text>

  <!-- WizeLife wordmark -->
  <text x="164" y="112" font-family="Arial, sans-serif" font-size="36" font-weight="700" fill="white" letter-spacing="-0.5">WizeLife</text>

  <!-- Tagline badge -->
  <rect x="80" y="158" width="270" height="34" rx="17" fill="url(#accent)" opacity="0.18"/>
  <rect x="80" y="158" width="270" height="34" rx="17" fill="none" stroke="url(#accent)" stroke-width="1" opacity="0.5"/>
  <text x="215" y="181" font-family="Arial, sans-serif" font-size="13" fill="#c4b5fd" text-anchor="middle" letter-spacing="1.5">AI-POWERED LIFE SUITE</text>

  <!-- Main headline -->
  <text x="80" y="290" font-family="Arial, sans-serif" font-size="62" font-weight="800" fill="white" letter-spacing="-1.5">Five AI tools for</text>
  <text x="80" y="365" font-family="Arial, sans-serif" font-size="62" font-weight="800" letter-spacing="-1.5">
    <tspan fill="white">every </tspan><tspan fill="url(#accent)">important</tspan>
  </text>
  <text x="80" y="440" font-family="Arial, sans-serif" font-size="62" font-weight="800" fill="white" letter-spacing="-1.5">decision in your life.</text>

  <!-- Tool pills -->
  <g font-family="Arial, sans-serif" font-size="14" font-weight="600">
    <!-- WizeMoney -->
    <rect x="80"  y="494" width="130" height="36" rx="18" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="145" y="517" fill="#94a3b8" text-anchor="middle">💰 WizeMoney</text>
    <!-- WizeTax -->
    <rect x="222" y="494" width="110" height="36" rx="18" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="277" y="517" fill="#94a3b8" text-anchor="middle">📊 WizeTax</text>
    <!-- WizeTravel -->
    <rect x="344" y="494" width="128" height="36" rx="18" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="408" y="517" fill="#94a3b8" text-anchor="middle">✈️ WizeTravel</text>
    <!-- WizeHealth -->
    <rect x="484" y="494" width="128" height="36" rx="18" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="548" y="517" fill="#94a3b8" text-anchor="middle">🩺 WizeHealth</text>
    <!-- WizeDeal -->
    <rect x="624" y="494" width="112" height="36" rx="18" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="680" y="517" fill="#94a3b8" text-anchor="middle">🏠 WizeDeal</text>
  </g>

  <!-- Right side — decorative card -->
  <rect x="820" y="100" width="310" height="190" rx="20" fill="#1e293b" opacity="0.7" stroke="#334155" stroke-width="1"/>
  <text x="840" y="140" font-family="Arial, sans-serif" font-size="13" fill="#64748b">Net Worth</text>
  <text x="840" y="178" font-family="Arial, sans-serif" font-size="38" font-weight="800" fill="white">₪842,300</text>
  <text x="840" y="210" font-family="Arial, sans-serif" font-size="13" fill="#10b981">↑ +12.4% this year</text>
  <!-- Mini chart bars -->
  <g opacity="0.6">
    <rect x="840" y="248" width="22" height="22" rx="4" fill="#334155"/>
    <rect x="870" y="238" width="22" height="32" rx="4" fill="#334155"/>
    <rect x="900" y="230" width="22" height="40" rx="4" fill="#6c63ff"/>
    <rect x="930" y="242" width="22" height="28" rx="4" fill="#334155"/>
    <rect x="960" y="225" width="22" height="45" rx="4" fill="#a855f7"/>
    <rect x="990" y="235" width="22" height="35" rx="4" fill="#334155"/>
    <rect x="1020" y="220" width="22" height="50" rx="4" fill="#6c63ff"/>
    <rect x="1050" y="228" width="22" height="42" rx="4" fill="#334155"/>
    <rect x="1080" y="215" width="22" height="55" rx="4" fill="#a855f7"/>
  </g>

  <!-- Second decorative card -->
  <rect x="870" y="320" width="260" height="150" rx="20" fill="#1e293b" opacity="0.6" stroke="#334155" stroke-width="1"/>
  <text x="890" y="358" font-family="Arial, sans-serif" font-size="13" fill="#64748b">AI Insight</text>
  <text x="890" y="388" font-family="Arial, sans-serif" font-size="15" font-weight="600" fill="white">You could save ₪1,200/mo</text>
  <text x="890" y="410" font-family="Arial, sans-serif" font-size="13" fill="#94a3b8">by optimizing 3 subscriptions</text>
  <rect x="890" y="428" width="90" height="26" rx="13" fill="url(#accent)"/>
  <text x="935" y="446" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="white" text-anchor="middle">See details</text>

  <!-- Domain -->
  <text x="1120" y="598" font-family="Arial, sans-serif" font-size="15" fill="#475569" text-anchor="end">wizelife.ai</text>
</svg>
