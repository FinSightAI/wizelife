<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/favicon.svg">
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-MPRTN6CJ9K"></script>

  window.dataLayer = window.dataLayer || [];

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — Wize Life</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #050810; --bg2: #0d1117; --bg3: #161b27;
    --border: rgba(255,255,255,0.08); --text: #f0f4ff; --muted: #8892a4;
    --accent: #6366f1; --accent2: #8b5cf6;
  }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }

  .card {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 24px;
    padding: 48px 40px; width: 100%; max-width: 420px;
    box-shadow: 0 32px 80px rgba(0,0,0,0.5);
  }

  .logo { text-align: center; margin-bottom: 32px; }
  .logo a { text-decoration: none; font-size: 1.5rem; font-weight: 800; color: var(--text); }
  .logo a span { color: var(--accent); }
  .logo p { color: var(--muted); font-size: 0.9rem; margin-top: 6px; }

  .tabs { display: flex; background: var(--bg3); border-radius: 12px; padding: 4px; margin-bottom: 28px; }
  .tab { flex: 1; text-align: center; padding: 10px; border-radius: 9px; cursor: pointer; font-size: 0.9rem; font-weight: 600; color: var(--muted); transition: all 0.2s; }
  .tab.active { background: var(--bg2); color: var(--text); box-shadow: 0 2px 8px rgba(0,0,0,0.3); }

  .form-group { margin-bottom: 16px; }
  label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--muted); margin-bottom: 6px; }
  input {
    width: 100%; padding: 12px 14px; background: var(--bg3);
    border: 1px solid var(--border); border-radius: 10px;
    color: var(--text); font-size: 0.95rem; font-family: inherit;
    transition: border-color 0.2s;
  }
  input:focus { outline: none; border-color: var(--accent); }
  input::placeholder { color: var(--muted); }

  .btn-primary {
    width: 100%; padding: 14px; margin-top: 8px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff; font-size: 1rem; font-weight: 700;
    border: none; border-radius: 12px; cursor: pointer;
    transition: opacity 0.2s;
  }
  .btn-primary:hover { opacity: 0.88; }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

  .divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; color: var(--muted); font-size: 0.8rem; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .btn-google {
    width: 100%; padding: 13px; background: var(--bg3);
    border: 1px solid var(--border); border-radius: 12px;
    color: var(--text); font-size: 0.95rem; font-weight: 600;
    cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
    transition: background 0.2s;
  }
  .btn-google:hover { background: var(--border); }
  .btn-google img { width: 20px; height: 20px; }

  .error { color: #f87171; font-size: 0.83rem; margin-top: 10px; text-align: center; min-height: 20px; }
  .back { text-align: center; margin-top: 24px; }
  .back a { color: var(--muted); font-size: 0.85rem; text-decoration: none; }
  .back a:hover { color: var(--text); }

  .pw-wrap { position: relative; }
  .pw-wrap input { padding-right: 42px; }
  .pw-toggle {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer; color: var(--muted);
    font-size: 1rem; line-height: 1; padding: 4px;
    transition: color 0.15s;
  }
  .pw-toggle:hover { color: var(--text); }

  .forgot { text-align: right; margin-top: 6px; }
  .forgot a { color: var(--muted); font-size: 0.8rem; text-decoration: none; }
  .forgot a:hover { color: var(--accent); }
</style>
</head>
<body>

<div class="card">
  <div class="logo">
    <a href="index.html">Wize<span>Life</span></a>
    <p>Your AI-powered life suite</p>
  </div>

  <div class="tabs">
    <div class="tab active" id="tabLogin" onclick="switchTab('login')">Sign In</div>
    <div class="tab" id="tabSignup" onclick="switchTab('signup')">Create Account</div>
  </div>

  <!-- Login Form -->
  <div id="loginForm">
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label>Password</label>
      <div class="pw-wrap">
        <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password">
        <button type="button" class="pw-toggle" onclick="togglePw('loginPassword', this)" tabindex="-1" aria-label="Show password">👁</button>
      </div>
    </div>
    <div class="forgot"><a href="#" onclick="forgotPassword(); return false;">Forgot password?</a></div>
    <button class="btn-primary" id="loginBtn" onclick="emailLogin()">Sign In</button>
    <div class="error" id="loginError"></div>
  </div>

  <!-- Signup Form -->
  <div id="signupForm" style="display:none;">
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="signupName" placeholder="כינוי — איך לקרוא לך? (Ofi, נועה, 007…)" autocomplete="nickname">
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="signupEmail" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label>Password</label>
      <div class="pw-wrap">
        <input type="password" id="signupPassword" placeholder="Min. 8 chars, uppercase &amp; special char" autocomplete="new-password">
        <button type="button" class="pw-toggle" onclick="togglePw('signupPassword', this)" tabindex="-1" aria-label="Show password">👁</button>
      </div>
    </div>
    <button class="btn-primary" id="signupBtn" onclick="emailSignup()">Create Account</button>
    <div class="error" id="signupError"></div>
  </div>

  <div class="divider">or</div>

  <button class="btn-google" onclick="googleLogin()">
    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
    Continue with Google
  </button>

  <div class="back"><a href="index.html">← Back to WizeLife</a></div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="js/wizelife-auth.js"></script>
<script>
  redirectIfLoggedIn("dashboard.html");

  function switchTab(tab) {
    document.getElementById("loginForm").style.display  = tab === "login"  ? "" : "none";
    document.getElementById("signupForm").style.display = tab === "signup" ? "" : "none";
    document.getElementById("tabLogin").classList.toggle("active",  tab === "login");
    document.getElementById("tabSignup").classList.toggle("active", tab === "signup");
  }

  function setLoading(btnId, loading) {
    document.getElementById(btnId).disabled = loading;
    document.getElementById(btnId).textContent = loading ? "Please wait…" : (btnId === "loginBtn" ? "Sign In" : "Create Account");
  }

  async function emailLogin() {
    const email = document.getElementById("loginEmail").value.trim();
    const pass  = document.getElementById("loginPassword").value;
    document.getElementById("loginError").textContent = "";
    setLoading("loginBtn", true);
    try {
      await wlAuth.signInWithEmailAndPassword(email, pass);
      window.location.href = "dashboard.html";
    } catch (e) {
      document.getElementById("loginError").textContent = friendlyError(e.code);
      setLoading("loginBtn", false);
    }
  }

  function validatePassword(pass) {
    if (pass.length < 8)             return "Password must be at least 8 characters.";
    if (!/[A-Z]/.test(pass))         return "Password must contain at least one uppercase letter.";
    if (!/[^A-Za-z0-9]/.test(pass))  return "Password must contain at least one special character (!@#$% etc.).";
    return null;
  }

  async function emailSignup() {
    const name  = document.getElementById("signupName").value.trim();
    const email = document.getElementById("signupEmail").value.trim();
    const pass  = document.getElementById("signupPassword").value;
    document.getElementById("signupError").textContent = "";

    const passError = validatePassword(pass);
    if (passError) {
      document.getElementById("signupError").textContent = passError;
      return;
    }

    setLoading("signupBtn", true);
    try {
      const cred = await wlAuth.createUserWithEmailAndPassword(email, pass);
      await cred.user.updateProfile({ displayName: name });
      await wlDb.collection("users").doc(cred.user.uid).set({
        plan: "free",
        nickname: name,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      }, { merge: true });
      localStorage.setItem("wl_nickname", name);
      window.location.href = "dashboard.html";
    } catch (e) {
      document.getElementById("signupError").textContent = friendlyError(e.code);
      setLoading("signupBtn", false);
    }
  }

  async function googleLogin() {
    try {
      const cred = await wlAuth.signInWithPopup(googleProvider);
      // First time? create user doc
      const ref = wlDb.collection("users").doc(cred.user.uid);
      const doc = await ref.get();
      const nick = cred.user.displayName || cred.user.email.split("@")[0];
      if (!doc.exists) {
        await ref.set({ plan: "free", nickname: nick, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
      } else {
        // Update nickname if missing
        const d = doc.data();
        if (!d.nickname) await ref.update({ nickname: nick });
      }
      localStorage.setItem("wl_nickname", (doc.exists && doc.data().nickname) ? doc.data().nickname : nick);
      window.location.href = "dashboard.html";
    } catch (e) {
      alert(friendlyError(e.code));
    }
  }

  function friendlyError(code) {
    const map = {
      "auth/user-not-found":      "No account with this email.",
      "auth/wrong-password":      "Wrong password.",
      "auth/invalid-email":       "Invalid email address.",
      "auth/email-already-in-use":"This email is already registered. Try signing in.",
      "auth/weak-password":       "Password must be at least 8 characters with uppercase and special character.",
      "auth/too-many-requests":   "Too many attempts. Try again later.",
      "auth/popup-closed-by-user":"Sign-in cancelled.",
    };
    return map[code] || "Something went wrong. Please try again.";
  }

  function togglePw(inputId, btn) {
    const input = document.getElementById(inputId);
    const show = input.type === "password";
    input.type = show ? "text" : "password";
    btn.textContent = show ? "🙈" : "👁";
  }

  async function forgotPassword() {
    const email = document.getElementById("loginEmail").value.trim();
    if (!email) {
      document.getElementById("loginError").textContent = "Enter your email above first.";
      document.getElementById("loginEmail").focus();
      return;
    }
    try {
      await wlAuth.sendPasswordResetEmail(email);
      document.getElementById("loginError").style.color = "#34d399";
      document.getElementById("loginError").textContent = "Reset email sent — check your inbox.";
    } catch (e) {
      document.getElementById("loginError").style.color = "";
      document.getElementById("loginError").textContent = friendlyError(e.code);
    }
  }

  // Allow Enter key
  document.addEventListener("keydown", e => {
    if (e.key !== "Enter") return;
    const loginVisible = document.getElementById("loginForm").style.display !== "none";
    if (loginVisible) emailLogin(); else emailSignup();
  });
</script>
</body>
</html>
