<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WizeTravel — Loading</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #050810;
    --surf: #0d1117;
    --border: rgba(255,255,255,0.07);
    --text: #e2e8f0;
    --muted: #6b7280;
    --accent: #3b82f6;
    --accent2: #60a5fa;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    text-align: center;
    padding: 24px;
    overflow: hidden;
  }

  /* Background glow */
  .glow {
    position: fixed;
    top: 30%;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(59,130,246,0.12), transparent 70%);
    pointer-events: none;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 48px;
  }
  .brand-icon {
    width: 48px;
    height: 48px;
    background: linear-gradient(135deg, #3b82f6, #6366f1);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.5rem;
    box-shadow: 0 8px 32px rgba(59,130,246,0.35);
  }
  .brand-name {
    text-align: left;
  }
  .brand-name .wize { color: var(--accent2); font-weight: 800; font-size: 1.3rem; }
  .brand-name .travel { color: var(--text); font-weight: 800; font-size: 1.3rem; }
  .brand-name .sub { font-size: 0.72rem; color: var(--muted); font-weight: 400; margin-top: 1px; }

  .status-card {
    background: var(--surf);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px 48px;
    max-width: 400px;
    width: 100%;
    position: relative;
    z-index: 1;
  }

  .plane-wrapper {
    position: relative;
    height: 60px;
    margin-bottom: 24px;
    overflow: hidden;
  }
  .plane {
    font-size: 2rem;
    position: absolute;
    animation: fly 2.5s ease-in-out infinite;
  }
  @keyframes fly {
    0%   { left: -10%; opacity: 0; transform: translateY(0); }
    10%  { opacity: 1; }
    50%  { transform: translateY(-10px); }
    90%  { opacity: 1; }
    100% { left: 110%; opacity: 0; transform: translateY(0); }
  }
  .trail {
    position: absolute;
    top: 50%;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(59,130,246,0.3), transparent);
    transform: translateY(-50%);
  }

  h2 {
    font-size: 1.1rem;
    font-weight: 700;
    margin-bottom: 8px;
    color: var(--text);
  }
  .sub-text {
    font-size: 0.84rem;
    color: var(--muted);
    margin-bottom: 28px;
    line-height: 1.5;
  }

  /* Progress bar */
  .progress-track {
    background: rgba(255,255,255,0.06);
    border-radius: 99px;
    height: 4px;
    margin-bottom: 12px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #3b82f6, #6366f1);
    border-radius: 99px;
    width: 0%;
    transition: width 0.8s ease;
  }
  .progress-label {
    font-size: 0.72rem;
    color: var(--muted);
    margin-bottom: 28px;
    display: flex;
    justify-content: space-between;
  }

  .tip-box {
    background: rgba(59,130,246,0.06);
    border: 1px solid rgba(59,130,246,0.15);
    border-radius: 10px;
    padding: 10px 16px;
    font-size: 0.76rem;
    color: var(--muted);
    line-height: 1.5;
  }
  .tip-box strong { color: var(--accent2); }
</style>
</head>
<body>
<div class="glow"></div>

<div class="brand">
  <div class="brand-icon">✈️</div>
  <div class="brand-name">
    <div><span class="wize">Wize</span><span class="travel">Travel</span></div>
    <div class="sub">AI-powered flight intelligence</div>
  </div>
</div>

<div class="status-card">
  <div class="plane-wrapper">
    <div class="trail"></div>
    <div class="plane">✈️</div>
  </div>

  <h2 id="status-title">Warming up engines…</h2>
  <p class="sub-text" id="status-sub">Our AI is starting up. This takes about 20–30 seconds on the first visit.</p>

  <div class="progress-track">
    <div class="progress-fill" id="progress"></div>
  </div>
  <div class="progress-label">
    <span id="progress-text">Connecting…</span>
    <span id="progress-pct">0%</span>
  </div>

  <div class="tip-box">
    <strong>💡 Tip:</strong> Add to home screen for instant access — no loading screen next time.
  </div>
</div>

<script>
  const APP_URL = 'https://nodedai.onrender.com';
  const HEALTH_URL = APP_URL + '/_stcore/health';

  let elapsed = 0;
  let attempts = 0;
  const MAX_WAIT = 90; // seconds

  const steps = [
    { at: 0,  pct: 5,  title: 'Warming up engines…',      sub: 'Server is starting. Hang tight!',              label: 'Connecting…' },
    { at: 8,  pct: 25, title: 'Initializing AI models…',  sub: 'Loading flight intelligence and route data.',   label: 'Loading models…' },
    { at: 18, pct: 50, title: 'Loading flight data…',      sub: 'Connecting to live price feeds.',              label: 'Fetching data…' },
    { at: 30, pct: 70, title: 'Almost ready…',             sub: 'Final checks before takeoff.',                 label: 'Almost there…' },
    { at: 45, pct: 85, title: 'Any second now…',           sub: 'Taking a bit longer than usual.',              label: 'Finalizing…' },
    { at: 65, pct: 92, title: 'Still loading…',            sub: 'Server may be under high load.',               label: 'Please wait…' },
  ];

  function updateUI() {
    const step = [...steps].reverse().find(s => elapsed >= s.at) || steps[0];
    document.getElementById('status-title').textContent = step.title;
    document.getElementById('status-sub').textContent   = step.sub;
    document.getElementById('progress-text').textContent = step.label;
    document.getElementById('progress-pct').textContent  = step.pct + '%';
    document.getElementById('progress').style.width = step.pct + '%';
  }

  async function checkReady() {
    attempts++;
    try {
      const ctrl = new AbortController();
      const timeout = setTimeout(() => ctrl.abort(), 4000);
      const res = await fetch(HEALTH_URL, { signal: ctrl.signal, cache: 'no-store' });
      clearTimeout(timeout);
      if (res.ok) {
        document.getElementById('progress').style.width = '100%';
        document.getElementById('progress-pct').textContent = '100%';
        document.getElementById('status-title').textContent = '🚀 Ready for takeoff!';
        document.getElementById('status-sub').textContent = 'Redirecting you now…';
        document.getElementById('progress-text').textContent = 'Done!';
        setTimeout(() => { window.location.href = APP_URL; }, 600);
        return true;
      }
    } catch(e) { /* still loading */ }
    return false;
  }

  async function poll() {
    updateUI();
    const ready = await checkReady();
    if (ready) return;

    elapsed++;
    if (elapsed >= MAX_WAIT) {
      document.getElementById('status-title').textContent = 'Taking longer than expected';
      document.getElementById('status-sub').textContent = 'Click below to try opening the app directly.';
      document.getElementById('progress-text').textContent = 'Timed out';
      const card = document.querySelector('.status-card');
      const btn = document.createElement('a');
      btn.href = APP_URL;
      btn.textContent = 'Open WizeTravel →';
      btn.style.cssText = 'display:block;margin-top:20px;padding:12px 24px;background:linear-gradient(135deg,#3b82f6,#6366f1);color:#fff;border-radius:10px;font-weight:700;font-size:.9rem;';
      card.appendChild(btn);
      return;
    }

    setTimeout(poll, 1000);
  }

  poll();
</script>
</body>
</html>
