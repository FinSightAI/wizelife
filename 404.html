<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found — WizeLife</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='%236366f1'/><stop offset='1' stop-color='%238b5cf6'/></linearGradient></defs><rect width='100' height='100' rx='22' fill='url(%23g)'/><text x='50' y='72' text-anchor='middle' font-family='Arial Black,sans-serif' font-weight='900' font-size='58' fill='white'>W</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800;900&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#03050e;--accent:#6366f1;--accent2:#8b5cf6;--text:#eef2ff;--muted:#7888a8;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:32px;overflow:hidden;}

.aurora{position:fixed;inset:0;pointer-events:none;z-index:0;}
.a1{position:absolute;width:600px;height:600px;top:-100px;left:-150px;background:radial-gradient(circle,rgba(99,102,241,.18),transparent 70%);border-radius:50%;animation:a1 14s ease-in-out infinite;}
.a2{position:absolute;width:500px;height:500px;bottom:-120px;right:-100px;background:radial-gradient(circle,rgba(139,92,246,.14),transparent 70%);border-radius:50%;animation:a2 18s ease-in-out infinite;}
@keyframes a1{0%,100%{transform:translate(0,0);}50%{transform:translate(80px,60px);}}
@keyframes a2{0%,100%{transform:translate(0,0);}50%{transform:translate(-60px,-80px);}}

.card{position:relative;z-index:1;max-width:480px;}
.num{font-family:'Plus Jakarta Sans',sans-serif;font-size:7rem;font-weight:900;line-height:1;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:16px;}
h1{font-family:'Plus Jakarta Sans',sans-serif;font-size:1.6rem;font-weight:800;margin-bottom:12px;}
p{color:var(--muted);font-size:.95rem;line-height:1.6;margin-bottom:32px;}
.btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
.btn-primary{padding:13px 28px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-weight:700;border-radius:12px;text-decoration:none;font-size:.95rem;}
.btn-secondary{padding:13px 28px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:var(--text);border-radius:12px;text-decoration:none;font-size:.95rem;}
.btn-primary:hover{opacity:.88;}
.btn-secondary:hover{background:rgba(255,255,255,0.1);}
</style>
</head>
<body>
<div class="aurora"><div class="a1"></div><div class="a2"></div></div>
<div class="card">
  <div class="num">404</div>
  <h1>Page not found</h1>
  <p>The page you're looking for doesn't exist or has moved. Let's get you back on track.</p>
  <div class="btns">
    <a href="index.html" class="btn-primary">Go to WizeLife →</a>
    <a href="auth.html" class="btn-secondary">Sign in</a>
  </div>
</div>
</body>
</html>
